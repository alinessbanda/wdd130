<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="Contact our white water rafting company to book trips, ask questions, or learn more about our exciting adventures.">
    <meta name="author" content="Aliness Banda">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.jpg" alt="White Water Rafting Company Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html" class="active">Contact Us</a>
        </nav>
    </header>

    <main>

        <section class="contact-header">
            <h1>White Water Rafting Company</h1>
            <p>45 Mountain View Drive</p>
            <p>Sandton, Johannesburg, South Africa</p>
            <p>+27 673 541 182</p>
            <p>info@whitewaterrafting.com</p>
        </section>

        <!-- MAP + FORM SIDE BY SIDE -->
        <section class="contact-layout">
            <h2 class="visually-hidden">Contact Layout</h2>

            <!-- MAP LEFT -->
            <div class="map">
                <iframe
                  src="https://www.google.com/maps?q=Sandton,Johannesburg,South%20Africa&output=embed"></iframe>
            </div>

            <!-- FORM RIGHT -->
            <div class="form">
                <form action="#" method="post">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" autocomplete="name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="email" required>

                    <p>Message Purpose</p>

                    <label for="general">
                        <input type="radio" id="general" name="purpose" value="general" required>
                        General Inquiry
                    </label>

                    <label for="reservation">
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label for="suggestion">
                        <input type="radio" id="suggestion" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>

                    <label for="subscribe">
                        <input type="checkbox" id="subscribe" name="subscribe">
                        Please Subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Get in Touch!</button>
                </form>
            </div>

        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-profiles">
                <figure>
                    <img src="images/employee1.jpg" alt="Employee 1">
                    <figcaption>John - Lead Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Employee 2">
                    <figcaption>Robert - Operations Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Employee 3">
                    <figcaption>Mike - Safety Instructor</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>©2026 ❖ White Water Rafting Company. ❖ Aliness Banda</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon" width="40">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon" width="40">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon" width="40">
            </a>
        </nav>
    </footer>
</body>

</html>
